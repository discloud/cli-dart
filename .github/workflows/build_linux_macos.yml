name: Build Linux & MacOS

on:
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      version:
        description: cli version e.g. 1.0.0
        type: string
        required: true
      prerelease:
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  binary_base_name: discloud-cli
  prerelease: ${{ inputs.prerelease || github.event.release.prerelease }}
  release_base_url: ${{ github.server_url }}/${{ github.repository }}/releases
  version: ${{ inputs.version || github.ref_name }}

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Get dependencies
        run: dart pub get

      - name: Prepare pubspec
        run: dart run scripts/prepare_pubspec.dart --version ${{ env.version }}

      - name: Run build runner
        run: dart run build_runner build -r -v --low-resources-mode

      - name: Generate docs
        run: dart run scripts/docs/generate.dart

      - name: Dart format
        run: |
          dart format .
          dart fix --apply

      - name: Run tests
        run: dart test

      - name: Compile
        run: |
          dart compile exe lib/main.dart -o ${{ env.binary_base_name }}-macos-arm64 --target-os=macos --target-arch=arm64
          dart compile exe lib/main.dart -o ${{ env.binary_base_name }}-linux-arm64 --target-os=linux --target-arch=arm64
          dart compile exe lib/main.dart -o ${{ env.binary_base_name }}-linux-x64 --target-os=linux --target-arch=x64

      - name: Save artifacts
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: ${{ env.version }}
          overwrite: true
          retention-days: 1
          path: |
            ${{ env.binary_base_name }}-macos-arm64
            ${{ env.binary_base_name }}-linux-arm64
            ${{ env.binary_base_name }}-linux-x64

  build-macos-x64:
    needs: build
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Get dependencies
        run: dart pub get

      - name: Prepare pubspec
        run: dart run scripts/prepare_pubspec.dart --version ${{ env.version }}

      - name: Run build runner
        run: dart run build_runner build -r -v --low-resources-mode

      - name: Generate docs
        run: dart run scripts/docs/generate.dart

      - name: Dart format
        run: |
          dart format .
          dart fix --apply

      - name: Run tests
        run: dart test

      - name: Compile
        run: dart compile exe lib/main.dart -o ${{ env.binary_base_name }}-macos-x64 --target-os=macos --target-arch=x64

      - name: Save artifacts
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: ${{ env.version }}
          overwrite: true
          retention-days: 1
          path: |
            ${{ env.binary_base_name }}-macos-arm64
            ${{ env.binary_base_name }}-macos-x64
            ${{ env.binary_base_name }}-linux-arm64
            ${{ env.binary_base_name }}-linux-x64

  archive:
    needs: build-macos-x64
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - target_os: macos
            target_arch: arm64
          - target_os: macos
            target_arch: x64
          - target_os: linux
            target_arch: arm64
          - target_os: linux
            target_arch: x64

    runs-on: macos-latest
    steps:
      - name: Get artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare archive
        run: |
          mkdir discloud
          cp ${{ env.binary_base_name }}-${{ matrix.target_os }}-${{ matrix.target_arch }} discloud/discloud
          tar -czf ${{ env.binary_base_name }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.tar.gz discloud
          rm -f discloud/discloud

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ env.prerelease }}
          tag_name: ${{ env.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ${{ env.binary_base_name }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.tar.gz
