name: Build MacOS

on:
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      version:
        description: cli version e.g. 1.0.0
        type: string
        required: true

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Get dependencies
        run: dart pub get

      - name: Upgrade pubspec version
        run: dart run scripts/upgrade_pubspec_version.dart --version ${{ inputs.version || github.ref_name }}

      - name: Run build runner
        run: dart run build_runner build -drv --low-resources-mode

      - name: Generate docs
        run: dart run scripts/docs/generate.dart

      - name: Dart format
        run: |
          dart format .
          dart fix --apply
          dart fix --apply --code=prefer_const_constructors,prefer_const_constructors_in_immutables,prefer_const_declarations,prefer_const_literals_to_create_immutables

      - name: Compile
        run: |
          dart compile exe lib/main.dart -o discloud-cli-macos-arm64 --target-os=macos --target-arch=arm64
          dart compile exe lib/main.dart -o discloud-cli-linux-arm64 --target-os=linux --target-arch=arm64

      - name: Prepare archive
        run: |
          mkdir discloud
          cp discloud-cli-macos-arm64 discloud/discloud
          tar -czf discloud-cli-macos-arm64.tar.gz discloud

      - name: Generate SHA256
        id: sha
        run: |
          echo "sha256=$(shasum -a 256 discloud-cli-macos-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ github.event.release.prerelease }}
          tag_name: ${{ inputs.version || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            discloud-cli-macos-arm64
            discloud-cli-linux-arm64
            ./*.tar.gz

      - name: Debug SHA
        run: echo "SHA256=${{ steps.sha.outputs.sha256 }}"
